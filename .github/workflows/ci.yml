name: Enterprise Service Hub CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ── Backend Build (Java/Maven) ─────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: |
        cd enterprise-service-hub
        mvn -B package --file pom.xml -DskipTests
        
    - name: Run Tests
      run: |
        cd enterprise-service-hub
        mvn test

  # ── Frontend Build (Node/Next.js) ──────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: nova-frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd nova-frontend
        npm ci
        
    - name: Next.js Lint & Build
      run: |
        cd nova-frontend
        npm run lint
        npm run build

  # ── Infrastructure Check (Docker Compose) ──────────────────────────────────
  docker-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate Docker Compose
      run: docker compose config -q
