---
# Backend Deployment — Spring Boot (3 replicas for horizontal scaling)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: enterprise-hub
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/api/actuator/prometheus"
    spec:
      containers:
        - name: backend
          image: enterprise-service-hub/backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: db-credentials
            - configMapRef:
                name: backend-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          startupProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: enterprise-hub
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: backend
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: enterprise-hub
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/enterprise_hub"
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: enterprise-hub
type: Opaque
stringData:
  POSTGRES_DB: enterprise_hub
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: elite_password_2026
  SPRING_DATASOURCE_USERNAME: admin
  SPRING_DATASOURCE_PASSWORD: elite_password_2026
